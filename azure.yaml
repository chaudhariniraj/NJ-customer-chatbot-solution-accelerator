# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: customer-chatbot-solution-accelerator
metadata:
  template: customer-chatbot-solution-accelerator@1.0

requiredVersions:
  azd: ">= 1.18.0 != 1.23.9"


infra:
  provider: bicep
  path: infra


hooks:
  preprovision:
    windows:
      shell: pwsh
      run: ./infra/scripts/pre-provision/preflight_scenario.ps1
      continueOnError: false
      interactive: false
    posix:
      shell: bash
      run: bash ./infra/scripts/pre-provision/preflight_scenario.sh
      continueOnError: false
      interactive: false

  postdeploy:
    windows:
      shell: pwsh
      run: |
        Write-Host "`n========================================" -ForegroundColor Green
        Write-Host " Deployment Complete!" -ForegroundColor Green
        Write-Host "========================================`n" -ForegroundColor Green

        Write-Host "Chat Web App URL: $env:CHAT_WEB_APP_URL`n"
        Write-Host "Scenario Web App URL: $env:SCENARIO_WEB_APP_URL`n"

        Write-Host "`n----------------------------------------" -ForegroundColor Yellow
        Write-Host " Post-Deployment Steps" -ForegroundColor Yellow
        Write-Host "----------------------------------------`n" -ForegroundColor Yellow

        Write-Host "1. Build and push the backend/frontend container images to ACR, then point the web apps at them:`n"
        Write-Host "   infra\scripts\post-provision\build_push_images.ps1`n" -ForegroundColor Cyan

        Write-Host "2. Load data and create AI Foundry agents:`n"
        Write-Host "   Option A - Run both stages at once (recommended):`n" -ForegroundColor White
        Write-Host "     infra\scripts\post-provision\postprovision_data_agents.ps1`n" -ForegroundColor Cyan
        Write-Host "   Option B - Run each stage individually:`n" -ForegroundColor White
        Write-Host "     Data:   infra\scripts\post-provision\data_scripts\run_upload_data_scripts.ps1" -ForegroundColor Cyan
        Write-Host "     Agents: infra\scripts\post-provision\agent_scripts\run_create_agents_scripts.ps1`n" -ForegroundColor Cyan
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: |
        echo ""
        echo "========================================"
        echo " Deployment Complete!"
        echo "========================================"
        echo ""

        echo "Chat Web App URL: $CHAT_WEB_APP_URL"
        echo "Scenario Web App URL: $SCENARIO_WEB_APP_URL"
        echo ""

        echo "----------------------------------------"
        echo " Post-Deployment Steps"
        echo "----------------------------------------"
        echo ""

        echo "1. Build and push the backend/frontend container images to ACR, then point the web apps at them:"
        echo ""
        echo "   bash ./infra/scripts/post-provision/build_push_images.sh"
        echo ""

        echo "2. Load data and create AI Foundry agents:"
        echo ""
        echo "   Option A - Run both stages at once (recommended):"
        echo "     bash ./infra/scripts/post-provision/postprovision_data_agents.sh"
        echo ""
        echo "   Option B - Run each stage individually:"
        echo "     Data:   bash ./infra/scripts/post-provision/data_scripts/run_upload_data_scripts.sh"
        echo "     Agents: bash ./infra/scripts/post-provision/agent_scripts/run_create_agents_scripts.sh"
        echo ""
      continueOnError: false
      interactive: true