# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: customer-chatbot-solution-accelerator
metadata:
  template: customer-chatbot-solution-accelerator@1.0

requiredVersions:
  azd: ">= 1.18.0 != 1.23.9"


infra:
  provider: bicep
  path: infra


hooks:
  preprovision:
    windows:
      shell: pwsh
      run: ./infra/scripts/pre-provision/preflight_scenario.ps1
      continueOnError: false
      interactive: false
    posix:
      shell: pwsh
      run: ./infra/scripts/pre-provision/preflight_scenario.ps1
      continueOnError: false
      interactive: false

  postdeploy:
    windows:
      shell: pwsh
      run: |
        Write-Host "`n========================================" -ForegroundColor Green
        Write-Host " Deployment Complete!" -ForegroundColor Green
        Write-Host "========================================`n" -ForegroundColor Green

        Write-Host "Chat Web App URL: $env:CHAT_WEB_APP_URL`n"
        Write-Host "Scenario Web App URL: $env:SCENARIO_WEB_APP_URL`n"

        Write-Host "`n----------------------------------------" -ForegroundColor Yellow
        Write-Host " Post-Deployment Steps" -ForegroundColor Yellow
        Write-Host "----------------------------------------`n" -ForegroundColor Yellow

        Write-Host "1. Build and push the backend/frontend container images to ACR, then point the web apps at them:`n"
        Write-Host "   infra\scripts\build_push_images.ps1`n" -ForegroundColor Cyan

        Write-Host "2. Run the data setup script to load sample product data:`n"
        Write-Host "   infra\scripts\data_scripts\run_upload_data_scripts.ps1`n" -ForegroundColor Cyan

        Write-Host "3. Run the agent setup script to create AI Foundry agents:`n"
        Write-Host "   infra\scripts\agent_scripts\run_create_agents_scripts.ps1`n" -ForegroundColor Cyan
      shell: pwsh
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: |
        echo ""
        echo "========================================"
        echo " Deployment Complete!"
        echo "========================================"
        echo ""

        echo "Chat Web App URL: $CHAT_WEB_APP_URL"
        echo "Scenario Web App URL: $SCENARIO_WEB_APP_URL"
        echo ""

        echo "----------------------------------------"
        echo " Post-Deployment Steps"
        echo "----------------------------------------"
        echo ""

        echo "1. Build and push the backend/frontend container images to ACR, then point the web apps at them:"
        echo ""
        echo "   bash ./infra/scripts/build_push_images.sh"
        echo ""

        echo "2. Run the data setup script to load sample product data:"
        echo ""
        echo "   bash ./infra/scripts/data_scripts/run_upload_data_scripts.sh"
        echo ""

        echo "3. Run the agent setup script to create AI Foundry agents:"
        echo ""
        echo "   bash ./infra/scripts/agent_scripts/run_create_agents_scripts.sh"
        echo ""
      continueOnError: false
      interactive: true